<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="900" height="500" viewBox="0 0 900 500">

  <!-- GIF de fondo -->
  <image href="https://raw.githubusercontent.com/SebastianBCF/SebastianBCF/main/Itadori2.gif"
         x="0" y="0" width="900" height="500" preserveAspectRatio="xMidYMid slice"/>

  <!-- Degradado oscuro centrado para hacer el texto legible -->
  <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#000000" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
  </radialGradient>
  <rect x="0" y="0" width="900" height="500" fill="url(#shadow)"/>

  <!-- Nombre centrado -->
  <text x="450" y="230"
        text-anchor="middle" dominant-baseline="middle"
        font-family="monospace" font-weight="bold" font-size="58"
        fill="white" opacity="1"
        filter="url(#glow)">SebastianBCF</text>

  <!-- Subtítulo -->
  <text x="450" y="295"
        text-anchor="middle" dominant-baseline="middle"
        font-family="monospace" font-weight="normal" font-size="20"
        fill="#cc3333">Full Stack Developer</text>

  <!-- Glow rojo sobre el texto -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

</svg>
