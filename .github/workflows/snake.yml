name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=cc3333&color_dot=%230a0000&color_dot=%233d0000&color_dot=%236b0000&color_dot=%238b0000&color_dot=%23cc3333
            dist/github-snake-dark.svg?color_snake=cc3333&color_dot=%230a0000&color_dot=%233d0000&color_dot=%236b0000&color_dot=%238b0000&color_dot=%23cc3333

      - name: Push SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
