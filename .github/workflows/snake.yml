name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%23cc3333

      - name: Replace green dot colors with crimson
        run: |
          sed -i \
            's/--c1:#[0-9a-f]*/--c1:#3d0000/g;
             s/--c2:#[0-9a-f]*/--c2:#6b0000/g;
             s/--c3:#[0-9a-f]*/--c3:#8b0000/g;
             s/--c4:#[0-9a-f]*/--c4:#cc3333/g' \
            dist/github-snake-dark.svg

      - name: Push SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
